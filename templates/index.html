<!DOCTYPE html>
<html>
<head>
    <title>Student Form</title>
    <style>
        /* Body styling */
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #6a11cb, #2575fc);
            color: #fff;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        /* Form container */
        form#form {
            background: rgba(0,0,0,0.6);
            padding: 30px 40px;
            border-radius: 15px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.5);
            display: flex;
            flex-direction: column;
            width: 300px;
        }

        /* Heading */
        h2 {
            text-align: center;
            margin-bottom: 20px;
            font-weight: 600;
            color: #fff;
        }

        /* Input fields */
        input {
            padding: 10px;
            margin: 8px 0;
            border-radius: 8px;
            border: none;
            outline: none;
            font-size: 14px;
        }

        input::placeholder {
            color: #888;
        }

        input:focus {
            box-shadow: 0 0 8px #fffc00;
        }

        /* Submit button */
        button {
            padding: 12px;
            margin-top: 12px;
            background: #fffc00;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            font-weight: bold;
            color: #000;
            transition: all 0.3s ease;
        }

        button:hover {
            background: #ffd700;
            transform: scale(1.05);
        }
    </style>
</head>
<body>

<h2>Register Student</h2>

<form id="form">
    <input placeholder="RegNo" id="regno"><br>
    <input placeholder="Second Name" id="secondname"><br>
    <input placeholder="Surname" id="surname"><br>
    <input placeholder="Course" id="course"><br>
    <input placeholder="County" id="county"><br>
    <input placeholder="Gender" id="gender"><br>
    <input placeholder="Department" id="department"><br>
    <input placeholder="School" id="school"><br>
    <button type="submit">Submit</button>
</form>

<script>
document.getElementById("form").addEventListener("submit", async (e) => {
    e.preventDefault();

    const data = {
        regno: regno.value,
        secondname: secondname.value,
        surname: surname.value,
        course: course.value,
        county: county.value,
        gender: gender.value,
        department: department.value,
        school: school.value
    };

    const res = await fetch("/add", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify(data)
    });

    const result = await res.json();
    alert(result.status);
});
</script>

</body>
</html>
